<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>

<nav class="navbar">
<a href="index.html" class="logo">House of Spectacular Opulence</a>
<div class="nav-links">
<a href="shop.html">Shop</a>
<a href="cart.html" class="cart-link">
Cart
<span id="cart-count" class="cart-badge">0</span>
</a>
</div>
</nav>

<section class="cart-section">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 id="subtotal"></h3>
<h3>Delivery: R80</h3>
<h2 id="total"></h2>

<h2>Customer Details</h2>
<form id="checkoutForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Phone Number (10 digits)" required>
<input type="email" id="email" placeholder="Email Address" required>
<input type="text" id="address" placeholder="Delivery Address" required>
<button type="submit" class="btn-gold">Place Order</button>
</form>

<div id="success-message" class="success-box"></div>

</section>

<script src="script.js"></script>
</body>
</html>
